# Quick start: ./deploy.sh
# Local stack: single app service + SQLite (volume waken_sqlite_data). No Postgres.
# Schema: Drizzle (`drizzle-kit push` in entrypoint). JWT: optional in .env; if empty, entrypoint persists /app/data/.jwt_secret.
services:
  app:
    image: ${WAKEN_IMAGE:-ghcr.io/moyoez/waken-wa:main}
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: file:/app/data/dev.db
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-3600}
      HOST: "0.0.0.0"
      HOSTNAME: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-}
      NODE_ENV: production
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      HCAPTCHA_SITE_KEY: ${HCAPTCHA_SITE_KEY:-}
      HCAPTCHA_SECRET_KEY: ${HCAPTCHA_SECRET_KEY:-}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
    volumes:
      - waken_sqlite_data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - waken_redis_data:/data

volumes:
  waken_sqlite_data:
  waken_redis_data:
